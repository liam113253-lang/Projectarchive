<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Study Portal</title> <!-- Generic title to avoid IT filters -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #ffffff; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Navigation */
        #sidebar { width: 250px; background: #1e1e1e; border-right: 2px solid #333; display: flex; flex-direction: column; padding: 20px 10px; }
        #sidebar h2 { font-size: 1.2rem; margin-bottom: 20px; padding-left: 10px; color: #00adb5; text-transform: uppercase; letter-spacing: 1px; }
        .game-btn { background: #2d2d2d; color: #fff; border: none; padding: 12px 15px; margin-bottom: 10px; text-align: left; border-radius: 6px; cursor: pointer; font-size: 0.95rem; transition: background 0.2s, transform 0.1s; }
        .game-btn:hover { background: #00adb5; transform: translateX(5px); }
        .game-btn:active { background: #008c9e; }
        
        /* Main Content Frame Area */
        #game-container { flex-grow: 1; display: flex; flex-direction: column; background: #121212; position: relative; }
        #game-frame { width: 100%; height: 100%; border: none; background: #000; }
        
        /* Placeholder Screen Before Game Loads */
        #placeholder { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #666; pointer-events: none; }
        #placeholder h1 { font-size: 2rem; margin-bottom: 10px; color: #444; }
    </style>
</head>
<body>

    <!-- Left Sidebar for selecting games -->
    <div id="sidebar">
        <h2>Study Links</h2>
        
        <!-- Replace the URLs in data-url with the actual direct links to games -->
        <button class="game-btn" data-url="https://chesscomfiles.com">Chess</button>
        <button class="game-btn" data-url="https://play2048.co">2048</button>
        <button class="game-btn" data-url="https://tetris.com">Tetris</button>
        <button class="game-btn" data-url="https://flappybird.io">Flappy Bird</button>
    </div>

    <!-- Right Window where games will actually open -->
    <div id="game-container">
        <div id="placeholder">
            <h1>Select a Module</h1>
            <p>Click a portal link on the left sidebar to begin loading.</p>
        </div>
        <iframe id="game-frame" src="" allowfullscreen></iframe>
    </div>

    <script>
        const buttons = document.querySelectorAll('.game-btn');
        const frame = document.getElementById('game-frame');
        const placeholder = document.getElementById('placeholder');

        buttons.forEach(button => {
            button.addEventListener('click', () => {
                // Hide placeholder screen
                placeholder.style.display = 'none';
                
                // Get the link stored in the button's data attribute
                const gameUrl = button.getAttribute('data-url');
                
                // Load that link inside our invisible frame window
                frame.src = gameUrl;
            });
        });
    </script>
</body>
</html>
